<!DOCTYPE html>
<html lang="en">
<head>
    <title>Accessible Custom Select Demo</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
	<style type="text/css">
	/* DEMO */
	body {background-color: #f8f9fa;margin: 0;padding: 0;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;color: #333;direction: ltr;}
	.container {width: 800px;max-width: 100%;margin: 0 auto;padding: 0 24px;box-sizing: border-box;}
	.sections {padding: 80px 0;}
	.demo-header {margin-bottom: 48px;text-align: center;}
	.demo-header h1 {font-size: 32px;font-weight: 700;color: #1a1a1a;}
	.demo-grid {display: grid;grid-template-columns: repeat(2, 1fr);gap: 32px;}
	/* DEMO */
	</style>
</head>
<body>

<main id="page-main">
    <section class="sections demo-dropdown-section">
        <div class="container">
            
            <div class="demo-header">
                <h1>y-select 2.1</h1>
                <p>Vanilla JS • ARIA Compliant • Custom Style</p>
            </div>

            <form class="demo-grid" action="" method="get">
                
                <select name="category" class="y-select">
                	<option value="">Choose Category</option>
                	<option value="tech">Technology</option>
                	<option value="finance">Finance</option>
                	<option value="legal">Legal Affairs</option>
                	<option value="marketing">Marketing</option>
                </select>

                <select name="sort" class="y-select">
                    <option value="">Sort Options</option>
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="relevant">Most Relevant</option>
                </select>

            </form>
        </div>
    </section>
</main>

<link rel="stylesheet" href="y-select.css"/>
<script type="text/javascript" src="y-select.js"></script>

</body>
</html>
